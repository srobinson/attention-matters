name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    # PR: always run. Push to main: only on direct pushes (skip merged PRs and release-please).
    if: >-
      github.event_name == 'pull_request'
      || (github.event.head_commit.committer.username != 'web-flow'
          && !contains(github.event.head_commit.message, 'chore(main): release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Audit
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

  bench:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install critcmp
        run: cargo install critcmp

      - name: Baseline benchmarks (base branch)
        run: cargo bench -p am-core --bench drift -- --save-baseline baseline || echo "No bench target on base branch, skipping baseline"

      - uses: actions/checkout@v4
        with:
          clean: false

      - name: PR benchmarks
        run: cargo bench -p am-core --bench drift -- --save-baseline current

      - name: Check for regressions (15% threshold)
        run: ./scripts/bench-gate.sh --compare
